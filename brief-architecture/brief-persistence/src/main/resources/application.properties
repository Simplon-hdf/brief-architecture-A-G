spring.config.import=classpath:secrets.properties

spring.application.name=brief-persistence

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/brief_architecture
spring.datasource.username=postgres
spring.datasource.password=postgres

# Server Configuration
server.port=8080

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=${LOGGING_LEVEL_ROOT}
logging.level.co.simplon=${LOGGING_LEVEL_CO_SIMPLON}

# Additional Configuration
spring.output.ansi.enabled=ALWAYS
